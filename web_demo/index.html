<!-- web_demo/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SLH-DSA Random Test Dashboard</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 16px 40px;
      background: #020617;
      color: #e5e7eb;
    }
    h1 {
      font-size: 1.8rem;
      margin-bottom: 0.2rem;
    }
    h2 {
      font-size: 1.2rem;
      margin-top: 1.8rem;
      margin-bottom: 0.4rem;
    }
    .muted {
      color: #9ca3af;
      font-size: 0.9rem;
    }
    .card {
      background: #020617;
      border-radius: 16px;
      padding: 18px 20px;
      margin-top: 1.2rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
      border: 1px solid #1f2937;
    }
    label {
      font-size: 0.9rem;
      color: #cbd5f5;
      display: block;
      margin-bottom: 0.4rem;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid #374151;
      background: #020617;
      color: #f9fafb;
      font-family: inherit;
      font-size: 0.9rem;
      margin-bottom: 0.8rem;
    }
    button {
      border: none;
      border-radius: 999px;
      padding: 8px 18px;
      background: #4f46e5;
      color: white;
      font-size: 0.95rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    button:hover {
      background: #6366f1;
    }
    button:disabled {
      opacity: 0.6;
      cursor: default;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      background: #020617;
      border: 1px solid #374151;
      margin-right: 6px;
      margin-top: 4px;
    }
    .pill.ok {
      border-color: #22c55e;
      color: #a7f3d0;
    }
    .pill.fail {
      border-color: #ef4444;
      color: #fecaca;
    }
    .pill.param {
      border-color: #0ea5e9;
      color: #bae6fd;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 0.4rem;
    }
    pre {
      background: #020617;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.8rem;
      line-height: 1.3;
      overflow-x: auto;
      border: 1px solid #111827;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 0.6rem;
      font-size: 0.8rem;
    }
    th, td {
      padding: 6px 8px;
      border-bottom: 1px solid #111827;
      text-align: left;
      white-space: nowrap;
    }
    th {
      font-weight: 600;
      color: #9ca3af;
    }
    tr:nth-child(even) td {
      background: rgba(15, 23, 42, 0.5);
    }
    .mono {
      font-family: "JetBrains Mono", Menlo, Monaco, Consolas, "Courier New", monospace;
    }
  </style>
</head>
<body>
  <h1>SLH-DSA Random Test Dashboard</h1>
  <p class="muted">
    Backend: Python SLH-DSA (FIPS 205, SHA2-256s). This page asks the server to generate a
    random message, sign it, verify it, and report timings & status.
  </p>

  <div class="card">
    <h2>1. Run random SLH-DSA test</h2>
    <label for="ctx">Context (SLH-DSA context string)</label>
    <input id="ctx" value="demo" />

    <button id="run-btn">
      ▶ Run random test
    </button>

    <p id="status" class="muted" style="margin-top:0.6rem;"></p>
  </div>

  <div class="card">
    <h2>2. Latest result</h2>
    <div id="latest">
      <p class="muted">No tests run yet.</p>
    </div>
  </div>

  <div class="card">
    <h2>3. History</h2>
    <div id="history">
      <p class="muted">No history yet.</p>
    </div>
  </div>

  <script>
    const runBtn = document.getElementById("run-btn");
    const statusEl = document.getElementById("status");
    const latestEl = document.getElementById("latest");
    const historyEl = document.getElementById("history");
    const ctxInput = document.getElementById("ctx");

    let stats = {
      runs: 0,
      totalSign: 0,
      totalVerify: 0,
      history: []  // latest first
    };

    async function runRandomTest() {
      runBtn.disabled = true;
      statusEl.textContent = "Requesting random message, signing and verifying on server...";
      if (stats.runs === 0) {
        latestEl.innerHTML = '<p class="muted">Working...</p>';
      }

      const ctx = ctxInput.value || "demo";

      try {
        const res = await fetch("/api/random_test", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ ctx })
        });

        if (!res.ok) {
          throw new Error("HTTP " + res.status);
        }

        const data = await res.json();

        stats.runs += 1;
        stats.totalSign += data.sign_time_ms;
        stats.totalVerify += data.verify_time_ms;
        stats.history.unshift(data); // add to front
        if (stats.history.length > 10) {
          stats.history.pop();
        }

        renderLatest(data);
        renderHistory();

        const avgSign = stats.totalSign / stats.runs;
        const avgVerify = stats.totalVerify / stats.runs;

        statusEl.textContent =
          `Last run: sign=${data.sign_time_ms.toFixed(2)} ms, ` +
          `verify=${data.verify_time_ms.toFixed(2)} ms ` +
          `(avg sign=${avgSign.toFixed(2)} ms, avg verify=${avgVerify.toFixed(2)} ms over ${stats.runs} runs)`;

      } catch (err) {
        console.error(err);
        statusEl.textContent = "Error: " + err.message;
        latestEl.innerHTML = '<p class="muted">Error occurred. Check browser console and server logs.</p>';
      } finally {
        runBtn.disabled = false;
      }
    }

    function renderLatest(data) {
      const okClass = data.verify_ok ? "ok" : "fail";
      const okText = data.verify_ok ? "Signature VALID" : "Signature INVALID";

      latestEl.innerHTML = `
        <div class="row">
          <span class="pill param">${data.param_set}</span>
          <span class="pill ${okClass}">${okText}</span>
          <span class="pill">sign: ${data.sign_time_ms.toFixed(2)} ms</span>
          <span class="pill">verify: ${data.verify_time_ms.toFixed(2)} ms</span>
        </div>
        <div class="row">
          <span class="pill">timestamp: ${data.timestamp}</span>
          <span class="pill">message length: ${data.message_len}</span>
        </div>

        <h3 style="margin-top:1.2rem;font-size:1rem;">Message</h3>
        <pre class="mono">${escapeHtml(data.message)}</pre>

        <h3 style="margin-top:1.2rem;font-size:1rem;">Context</h3>
        <pre class="mono">${escapeHtml(data.ctx)}</pre>

        <h3 style="margin-top:1.2rem;font-size:1rem;">Signature (preview)</h3>
        <pre class="mono">${escapeHtml(data.signature_preview)}</pre>
      `;
    }

    function renderHistory() {
      if (stats.history.length === 0) {
        historyEl.innerHTML = '<p class="muted">No history yet.</p>';
        return;
      }

      let rows = stats.history.map((d, idx) => {
        const okText = d.verify_ok ? "OK" : "FAIL";
        return `
          <tr>
            <td>${idx + 1}</td>
            <td>${d.timestamp}</td>
            <td>${d.message_len}</td>
            <td>${d.sign_time_ms.toFixed(2)}</td>
            <td>${d.verify_time_ms.toFixed(2)}</td>
            <td>${okText}</td>
          </tr>
        `;
      }).join("");

      historyEl.innerHTML = `
        <table class="mono">
          <thead>
            <tr>
              <th>#</th>
              <th>Timestamp (UTC)</th>
              <th>Len</th>
              <th>Sign (ms)</th>
              <th>Verify (ms)</th>
              <th>OK?</th>
            </tr>
          </thead>
          <tbody>
            ${rows}
          </tbody>
        </table>
      `;
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    runBtn.addEventListener("click", runRandomTest);
  </script>
</body>
</html>
